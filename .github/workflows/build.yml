name: Build Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 3.0.1），留空则自动从 pyproject.toml 读取"
        required: false
        default: ""
      model_mode:
        description: "本地模型模式"
        required: false
        default: "bundled"
        type: choice
        options:
          - bundled
          - download

  push:
    branches:
      - main
    paths:
      - "autokat/**"
      - "models/**"
      - "assets/**"
      - "packaging/**"
      - "build_win.py"
      - "pyproject.toml"

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "版本: $VERSION"

      - name: Set model_mode
        id: model_mode
        shell: bash
        run: |
          MODE="${{ github.event.inputs.model_mode }}"
          if [ -z "$MODE" ]; then MODE="bundled"; fi
          echo "MODE=$MODE" >> $GITHUB_OUTPUT
          echo "模型模式: $MODE"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install --upgrade pip pyinstaller PySide6==6.8.1 Pillow==10.4.0 numpy==1.26.4 tqdm==4.66.5 imagehash==4.3.1 soundfile==0.12.1 pydub==0.25.1 librosa==0.10.2.post1 scipy==1.13.1 numba==0.60.0 joblib==1.4.2 msgpack==1.1.0 edge-tts==6.1.12 onnxruntime==1.19.2

      - name: Download FFmpeg
        id: ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $dest = "$env:TEMP\ffmpeg.zip"
          Write-Host "下载 FFmpeg..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $url -OutFile $dest
          $ffmpegDir = "$env:RUNNER_TEMP\ffmpeg"
          New-Item -ItemType Directory -Force -Path $ffmpegDir | Out-Null
          Expand-Archive -Path $dest -DestinationPath $ffmpegDir -Force
          $subDir = (Get-ChildItem -Path $ffmpegDir -Directory | Select-Object -First 1).FullName
          $binDir = "$subDir\bin"
          Copy-Item "$binDir\*" -Destination $ffmpegDir -Force
          Get-ChildItem $ffmpegDir -File | Select-Object Name
          "FFMPEG_DIR=$ffmpegDir" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        shell: pwsh
        env:
          AUTOKAT_APP_VERSION: ${{ steps.version.outputs.VERSION }}
          AUTOKAT_LOCAL_MODEL_MODE: ${{ steps.model_mode.outputs.MODE }}
        run: |
          Write-Host "=== PyInstaller 构建 (v$env:AUTOKAT_APP_VERSION) ==="
          pyinstaller packaging/AutoCat-win.spec --noconfirm --distpath dist --workpath build_win
          Get-ChildItem "dist\AutoCat" -File | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,1)}}

      - name: Bundle FFmpeg
        shell: pwsh
        run: |
          $ffmpegDir = "${{ steps.ffmpeg.outputs.FFMPEG_DIR }}"
          Copy-Item "$ffmpegDir\ffmpeg.exe" -Destination "dist\AutoCat\" -Force
          Copy-Item "$ffmpegDir\ffprobe.exe" -Destination "dist\AutoCat\" -Force
          Write-Host "FFmpeg 已复制"
          Get-ChildItem "dist\AutoCat" -Filter "*.exe" | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,1)}}

      - name: Install NSIS
        shell: pwsh
        run: |
          $nsis = Get-Command makensis -ErrorAction SilentlyContinue
          if (-not $nsis) {
            choco install nsis -y --no-progress
            $candidateDirs = @(
              "$env:ProgramData\chocolatey\bin",
              "${env:ProgramFiles(x86)}\NSIS",
              "$env:ProgramFiles\NSIS"
            )
            $candidateDirs | Where-Object { Test-Path $_ } | ForEach-Object {
              $_ | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
            $env:PATH = ($candidateDirs + $env:PATH) -join ";"
            $nsis = Get-Command makensis -ErrorAction SilentlyContinue
            if (-not $nsis) {
              $nsisExe = $candidateDirs |
                ForEach-Object { Join-Path $_ "makensis.exe" } |
                Where-Object { Test-Path $_ } |
                Select-Object -First 1
              if ($nsisExe) {
                Set-Alias makensis $nsisExe
                $nsis = Get-Command makensis -ErrorAction SilentlyContinue
              }
            }
          }
          if (-not $nsis) {
            throw "makensis not found after NSIS installation"
          }
          Write-Host "NSIS: $($nsis.Source)"

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $nsiContent = Get-Content "packaging\AutoCat-win.nsi" -Raw
          $nsiContent = $nsiContent -replace '!define PRODUCT_VERSION "[^"]+"', "!define PRODUCT_VERSION `"$version`""
          $tmpNsi = "AutoCat-win-ci.nsi"
          Set-Content -Path $tmpNsi -Value $nsiContent -Encoding UTF8
          makensis $tmpNsi
          if ($LASTEXITCODE -ne 0) {
            throw "makensis failed with exit code $LASTEXITCODE"
          }
          Remove-Item $tmpNsi -Force
          $installer = "dist\AutoCat-$version-windows-x86_64.exe"
          if (-not (Test-Path $installer)) {
            throw "NSIS installer was not created: $installer"
          }
          Get-Item $installer | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,1)}}

      - name: Build portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zipPath = "dist\AutoCat-$version-windows-x86_64-portable.zip"
          $zipFullPath = (Join-Path (Get-Location) $zipPath)
          Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (Test-Path $sevenZip) {
            Push-Location "dist\AutoCat"
            try {
              & $sevenZip a -tzip -mm=Deflate -mcu=on $zipFullPath ".\*" | Out-Host
            } finally {
              Pop-Location
            }
          } else {
            Compress-Archive -Path "dist\AutoCat\*" -DestinationPath $zipPath -CompressionLevel Optimal
          }
          if (-not (Test-Path $zipPath)) {
            throw "Portable zip was not created: $zipPath"
          }
          Get-Item $zipPath | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,1)}}

      - name: Verify distributables
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $installer = "dist\AutoCat-$version-windows-x86_64.exe"
          $zipPath = "dist\AutoCat-$version-windows-x86_64-portable.zip"
          $extractDir = "$env:RUNNER_TEMP\autocat-portable-check"
          Remove-Item $extractDir -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          if (-not (Test-Path "$extractDir\AutoCat.exe")) {
            throw "Portable zip does not extract to AutoCat.exe"
          }
          if (-not (Test-Path "$extractDir\ffmpeg.exe")) {
            throw "Portable zip does not include ffmpeg.exe"
          }
          if ((Get-Item $installer).Length -le 0) {
            throw "Installer is empty"
          }
          Remove-Item "dist\SHA256SUMS" -Force -ErrorAction SilentlyContinue
          Get-ChildItem "dist" -File | Where-Object { $_.Extension -in ".exe", ".zip" } | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Out-File -Encoding ASCII -Append "dist\SHA256SUMS"
          }
          Get-Content "dist\SHA256SUMS"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoCat-${{ steps.version.outputs.VERSION }}-windows-x86_64
          path: |
            dist/AutoCat-${{ steps.version.outputs.VERSION }}-windows-x86_64.exe
            dist/AutoCat-${{ steps.version.outputs.VERSION }}-windows-x86_64-portable.zip
            dist/SHA256SUMS
          compression-level: 0
          retention-days: 14

      - name: Summary
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $m = "${{ steps.model_mode.outputs.MODE }}"
          $allFiles = Get-ChildItem "dist\AutoCat" -Recurse -File
          $totalMB = [math]::Round(($allFiles | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host ""
          Write-Host "## ✅ Windows 构建完成"
          Write-Host ""
          Write-Host "| 项目 | 值 |"
          Write-Host "|------|----|"
          Write-Host "| 版本 | `$v |"
          Write-Host "| 模型模式 | `$m |"
          Write-Host "| 总大小 | `$totalMB MB |"
          Write-Host "| 安装包 | `dist/AutoCat-$v-windows-x86_64.exe` |"
          Write-Host "| 便携包 | `dist/AutoCat-$v-windows-x86_64-portable.zip` |"
          Write-Host "| 架构 | x86_64 |"
          Write-Host "| 最低系统 | Windows 10 |"
